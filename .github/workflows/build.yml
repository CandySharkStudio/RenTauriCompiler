name: Build Ren-Tauri Compiler

on:
  workflow_dispatch:
    inputs:
      version:
        description: version
        required: true
  # push:
  #   branches: [main]

jobs:
  publish-executable-file:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64
          - os: windows-latest
            target: i686-pc-windows-msvc
            platform: windows
            arch: i686
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
            arch: aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos
            arch: aarch64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            arch: x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: aarch64
          # - os: ubuntu-latest
          #   target: x86_64-unknown-freebsd
          #   platform: freebsd
          #   arch: x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Replace version
        run: |
          if [[ "$(uname)" == "Darwin" ]]; then
            sed -i '' '/print("version: /d' src/main.zig
            sed -i '' '"--version")/aprint("version: ${{ github.event.inputs.version }}\n", .{});' src/main.zig
          else
            sed -i '/print("version: /d' src/main.zig
            sed -i '"--version"/aprint("version: ${{ github.event.inputs.version }}\n", .{});' src/main.zig
          fi
        shell: bash
      - name: Run build
        run: zig build -Doptimize=ReleaseSmall
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Bundle-${{matrix.platform}}-${{matrix.arch}}
          path: zig-out/bin/rtc
          if-no-files-found: error
        if: ${{ matrix.platform != 'windows' }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Bundle-${{matrix.platform}}-${{matrix.arch}}
          path: zig-out/bin/rtc.exe
          if-no-files-found: error
        if: ${{ matrix.platform == 'windows' }}
